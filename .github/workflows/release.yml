name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install Python backend dependencies
        run: pip install -r requirements.txt

      - name: Build backend with PyInstaller
        run: pyinstaller --noconfirm backend.spec

      - name: Create sidecar directory and copy backend binary
        run: |
          New-Item -ItemType Directory -Path "src-tauri\binaries" -Force
          Copy-Item "dist\backend.exe" "src-tauri\binaries\backend-x86_64-pc-windows-msvc.exe" -Force

      - name: Build Tauri app (with signing)
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          echo "=== ENV CHECK ==="
          echo "TAURI_SIGNING_PRIVATE_KEY length: ${#TAURI_SIGNING_PRIVATE_KEY}"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD: [${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}]"
          echo ""

          npx tauri build

          echo ""
          echo "=== BUILD OUTPUT ==="
          echo "NSIS dir contents:"
          ls -la src-tauri/target/release/bundle/nsis/ || echo "  (no nsis dir)"
          echo "MSI dir contents:"
          ls -la src-tauri/target/release/bundle/msi/ || echo "  (no msi dir)"
          echo "All .sig files:"
          find src-tauri/target/release/bundle -name "*.sig" 2>/dev/null || echo "  (no .sig files found)"
          echo "All .nsis.zip files:"
          find src-tauri/target/release/bundle -name "*.nsis.zip" 2>/dev/null || echo "  (no .nsis.zip files found)"

      - name: Sign bundles and create release
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BUNDLE_DIR="src-tauri/target/release/bundle"

          echo "=== VERSION: $VERSION, TAG: $TAG ==="

          # ── Always create zip with standard Deflate compression ──
          # Tauri/PowerShell may use Deflate64 or zstd which the updater can't read
          NSIS_EXE=$(find "$BUNDLE_DIR/nsis" -name "*.exe" 2>/dev/null | head -1)
          if [ -z "$NSIS_EXE" ]; then
            echo "FATAL: No .exe found in NSIS bundle dir!"
            exit 1
          fi

          # Recreate zip with STORE method (no compression = method 0)
          # The tauri-plugin-updater uses zip crate WITHOUT deflate feature enabled,
          # so it can ONLY read Store (method 0) zips, not Deflate (method 8).
          # cd into the dir so the exe is stored at zip root (no subdirectory paths)
          NSIS_DIR=$(dirname "$NSIS_EXE")
          NSIS_EXE_NAME=$(basename "$NSIS_EXE")
          NSIS_ZIP_NAME="${NSIS_EXE_NAME%.exe}.nsis.zip"
          NSIS_ZIP_NEW="$NSIS_DIR/$NSIS_ZIP_NAME"
          rm -f "$NSIS_ZIP_NEW"
          echo "Creating zip with STORE method (no compression, max compatibility)..."
          pushd "$NSIS_DIR"
          7z a -tzip -mx=0 "$NSIS_ZIP_NAME" "$NSIS_EXE_NAME"
          echo "Zip contents (verify Method = Store):"
          7z l -slt "$NSIS_ZIP_NAME" | grep -E "^(Path|Method|Size)" | head -10
          popd
          NSIS_ZIP="$NSIS_ZIP_NEW"
          echo "Zip created: $(ls -la "$NSIS_ZIP")"

          # Sign the new zip
          echo "Signing zip..."
          npx tauri signer sign "$NSIS_ZIP"

          if [ -f "${NSIS_ZIP}.sig" ]; then
            NSIS_ZIP_SIG=$(cat "${NSIS_ZIP}.sig")
            echo "Signing succeeded! (sig length: ${#NSIS_ZIP_SIG})"
          else
            echo "FATAL: Signing failed - no .sig file created"
            exit 1
          fi

          echo ""
          echo "=== SIGNATURE PREVIEW ==="
          echo "${NSIS_ZIP_SIG:0:60}..."

          # ── Build latest.json ──
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NSIS_ZIP_NAME=$(basename "$NSIS_ZIP")
          DOWNLOAD_URL="https://github.com/$GITHUB_REPOSITORY/releases/download/$TAG/$NSIS_ZIP_NAME"

          printf '{\n  "version": "%s",\n  "notes": "Nouvelle version du Dashboard IT.",\n  "pub_date": "%s",\n  "platforms": {\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "%s"\n    }\n  }\n}\n' "$VERSION" "$NOW" "$NSIS_ZIP_SIG" "$DOWNLOAD_URL" > latest.json

          echo ""
          echo "=== latest.json ==="
          cat latest.json

          # ── Create GitHub Release ──
          echo ""
          echo "=== CREATING RELEASE ==="
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ITManager Dashboard $TAG" \
            --notes "Nouvelle version du Dashboard IT." \
            --latest

          sleep 3

          # ── Upload assets ──
          echo "=== UPLOADING ASSETS ==="
          NSIS_EXE=$(find "$BUNDLE_DIR/nsis" -name "*.exe" 2>/dev/null | head -1)
          MSI_FILE=$(find "$BUNDLE_DIR/msi" -name "*.msi" 2>/dev/null | head -1)

          for f in latest.json "$NSIS_EXE" "$MSI_FILE" "$NSIS_ZIP"; do
            if [ -n "$f" ] && [ -f "$f" ]; then
              echo "Uploading: $f"
              gh release upload "$TAG" "$f" --repo "$GITHUB_REPOSITORY" --clobber
            fi
          done

          # Upload any .sig files too
          find "$BUNDLE_DIR" -name "*.sig" 2>/dev/null | while read sigfile; do
            echo "Uploading sig: $sigfile"
            gh release upload "$TAG" "$sigfile" --repo "$GITHUB_REPOSITORY" --clobber
          done

          echo ""
          echo "=== DONE ==="
          echo "Release $TAG published with signed updater!"
