name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install Python backend dependencies
        run: pip install -r requirements.txt

      - name: Build backend with PyInstaller
        run: pyinstaller --noconfirm backend.spec

      - name: Create sidecar directory and copy backend binary
        run: |
          New-Item -ItemType Directory -Path "src-tauri\binaries" -Force
          Copy-Item "dist\backend.exe" "src-tauri\binaries\backend-x86_64-pc-windows-msvc.exe" -Force

      - name: Debug signing key
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is SET (length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length))"
          } else {
            Write-Host "WARNING: TAURI_SIGNING_PRIVATE_KEY is EMPTY or NOT SET"
          }
          Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD is: '$($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)'"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ITManager Dashboard ${{ github.ref_name }}"
          releaseBody: "Nouvelle version du Dashboard IT."
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true

      - name: Debug Tauri outputs
        run: |
          Write-Host "Tauri artifacts:"
          Get-ChildItem -Recurse "src-tauri\target\release\bundle" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          Write-Host "---"
          Write-Host "Looking for .sig files:"
          Get-ChildItem -Recurse "src-tauri\target\release\bundle" -Filter "*.sig" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
