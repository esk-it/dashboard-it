name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install Python backend dependencies
        run: pip install -r requirements.txt

      - name: Build backend with PyInstaller
        run: pyinstaller --noconfirm backend.spec

      - name: Create sidecar directory and copy backend binary
        run: |
          New-Item -ItemType Directory -Path "src-tauri\binaries" -Force
          Copy-Item "dist\backend.exe" "src-tauri\binaries\backend-x86_64-pc-windows-msvc.exe" -Force

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          Write-Host "=== ENV CHECK ==="
          Write-Host "TAURI_SIGNING_PRIVATE_KEY length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          Write-Host "TAURI_SIGNING_PRIVATE_KEY_PASSWORD: [$($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)]"
          Write-Host ""

          npx tauri build 2>&1

          Write-Host ""
          Write-Host "=== BUILD OUTPUT ==="
          $bundleDir = "src-tauri\target\release\bundle"
          Write-Host "NSIS dir contents:"
          Get-ChildItem "$bundleDir\nsis\" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name) - $($_.Length) bytes" }
          Write-Host "MSI dir contents:"
          Get-ChildItem "$bundleDir\msi\" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name) - $($_.Length) bytes" }
          Write-Host "All .sig files found:"
          Get-ChildItem -Recurse "$bundleDir" -Filter "*.sig" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }

      - name: Sign, create latest.json and upload release
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $tag = "${{ github.ref_name }}"
          $bundleDir = "src-tauri\target\release\bundle"
          $repo = "${{ github.repository }}"

          Write-Host "=== SIGNING KEY CHECK ==="
          Write-Host "Key length: $($env:TAURI_SIGNING_PRIVATE_KEY.Length)"

          # ── Find or create the NSIS zip ──
          $nsisZip = Get-ChildItem "$bundleDir\nsis\*.nsis.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsisZipSig = ""

          if ($nsisZip) {
            Write-Host "Auto-generated .nsis.zip found: $($nsisZip.Name)"
            $autoSig = "$($nsisZip.FullName).sig"
            if (Test-Path $autoSig) {
              $nsisZipSig = (Get-Content $autoSig -Raw).Trim()
              Write-Host "Auto-generated signature found!"
            }
          }

          # If no zip or no sig, do it manually
          if (-not $nsisZip -or -not $nsisZipSig) {
            Write-Host "Manual signing fallback..."
            $nsisExe = Get-ChildItem "$bundleDir\nsis\*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($nsisExe) {
              # Create zip if needed
              if (-not $nsisZip) {
                $zipPath = $nsisExe.FullName -replace '\.exe$', '.nsis.zip'
                Write-Host "Creating zip: $zipPath"
                Compress-Archive -Path $nsisExe.FullName -DestinationPath $zipPath -Force
                $nsisZip = Get-Item $zipPath
              }

              # Sign with tauri signer — write key to temp file to avoid shell escaping issues
              $keyFile = [System.IO.Path]::GetTempFileName()
              [System.IO.File]::WriteAllText($keyFile, $env:TAURI_SIGNING_PRIVATE_KEY)
              Write-Host "Key written to temp file, size: $((Get-Item $keyFile).Length) bytes"

              Write-Host "Running: npx tauri signer sign -k <keyfile> -p '' $($nsisZip.FullName)"
              $output = & npx tauri signer sign --private-key (Get-Content $keyFile -Raw).Trim() --password "" "$($nsisZip.FullName)" 2>&1
              Write-Host "Signer output: $output"

              Remove-Item $keyFile -Force

              $sigPath = "$($nsisZip.FullName).sig"
              if (Test-Path $sigPath) {
                $nsisZipSig = (Get-Content $sigPath -Raw).Trim()
                Write-Host "Signature generated! (length: $($nsisZipSig.Length))"
              } else {
                Write-Host "ERROR: .sig file not created!"
                Write-Host "Trying alternative approach with file-based key..."

                # Alternative: use --private-key-path
                $keyFile2 = [System.IO.Path]::GetTempFileName()
                [System.IO.File]::WriteAllText($keyFile2, $env:TAURI_SIGNING_PRIVATE_KEY)
                $output2 = & npx tauri signer sign "$($nsisZip.FullName)" --private-key-path "$keyFile2" --password "" 2>&1
                Write-Host "Alternative signer output: $output2"
                Remove-Item $keyFile2 -Force

                if (Test-Path $sigPath) {
                  $nsisZipSig = (Get-Content $sigPath -Raw).Trim()
                  Write-Host "Alternative signing succeeded!"
                } else {
                  Write-Host "FATAL: All signing methods failed"
                }
              }
            } else {
              Write-Host "FATAL: No .exe found in NSIS bundle dir!"
            }
          }

          if (-not $nsisZipSig) {
            Write-Host "WARNING: No signature available, latest.json will have empty signature"
          }

          # ── Build latest.json ──
          $now = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $latestObj = @{
            version = $version
            notes = "Nouvelle version du Dashboard IT."
            pub_date = $now
            platforms = @{
              "windows-x86_64" = @{
                signature = $nsisZipSig
                url = "https://github.com/$repo/releases/download/$tag/$($nsisZip.Name)"
              }
            }
          }
          $latestJson = $latestObj | ConvertTo-Json -Depth 5
          Write-Host "latest.json:"
          Write-Host $latestJson
          $latestJson | Out-File -FilePath "latest.json" -Encoding utf8NoBOM

          # ── Create GitHub Release ──
          Write-Host ""
          Write-Host "=== CREATING RELEASE ==="
          $createOutput = & gh release create $tag --repo $repo --title "ITManager Dashboard $tag" --notes "Nouvelle version du Dashboard IT." --latest 2>&1
          Write-Host "Release create output: $createOutput"

          # Wait a moment for GitHub to process
          Start-Sleep -Seconds 3

          # Verify release exists
          $verifyOutput = & gh release view $tag --repo $repo 2>&1
          Write-Host "Release verify: $($verifyOutput | Select-Object -First 3)"

          # ── Upload assets ──
          Write-Host ""
          Write-Host "=== UPLOADING ASSETS ==="
          $nsisExe = Get-ChildItem "$bundleDir\nsis\*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $msiFile = Get-ChildItem "$bundleDir\msi\*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1

          $filesToUpload = @("latest.json")
          if ($nsisExe) { $filesToUpload += $nsisExe.FullName }
          if ($msiFile) { $filesToUpload += $msiFile.FullName }
          if ($nsisZip) { $filesToUpload += $nsisZip.FullName }
          Get-ChildItem -Recurse "$bundleDir" -Filter "*.sig" -ErrorAction SilentlyContinue | ForEach-Object { $filesToUpload += $_.FullName }

          foreach ($f in $filesToUpload) {
            if (Test-Path $f) {
              Write-Host "Uploading: $f"
              $uploadOutput = & gh release upload $tag $f --repo $repo --clobber 2>&1
              Write-Host "  Result: $uploadOutput"
            } else {
              Write-Host "SKIP (not found): $f"
            }
          }

          Write-Host ""
          Write-Host "=== DONE ==="
          Write-Host "Release $tag published successfully."
